<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PLATEAU 新宿テスト</title>
<!-- CesiumJS 静的ファイルの場所をCDNに向ける（import前に必須） -->
<script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.122/Build/Cesium/';</script>
<script src="https://cdn.jsdelivr.net/npm/cesium@1.122/Build/Cesium/Cesium.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cesium@1.122/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0e14;font-family:-apple-system,system-ui,sans-serif;}
  #cesiumContainer{position:absolute;inset:0;}
  /* Cesiumの不要UIを隠す（テストなので地球だけ見たい） */
  .cesium-viewer-bottom,.cesium-viewer-animationContainer,.cesium-viewer-timelineContainer,
  .cesium-viewer-toolbar,.cesium-viewer-fullscreenContainer,.cesium-viewer-geocoderContainer{display:none!important;}
  #status{position:fixed;top:env(safe-area-inset-top,10px);left:10px;right:10px;z-index:999;
    background:rgba(8,16,22,0.85);color:#2effc6;font-size:13px;line-height:1.7;padding:10px 14px;
    border:1px solid rgba(120,220,200,0.3);border-radius:10px;white-space:pre-wrap;backdrop-filter:blur(8px);}
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="status">起動中...</div>
<script>
const log = (m) => { document.getElementById('status').textContent = m; };
(async function() {
  try {
    if (typeof Cesium === 'undefined') { log('❌ Cesium本体の読み込み失敗（CDN到達不可）'); return; }
    log('Cesium読込OK。地球を生成中...');

    // Cesium ionトークン不要構成：地形は既定の楕円体、背景はOSMタイル（キー不要）
    const viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: Cesium.ImageryLayer.fromProviderAsync(
        Promise.resolve(new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })), {}),
      terrain: undefined,            // ion不要のため地形なし（テストでは平面でOK）
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false,
    });
    viewer.scene.globe.depthTestAgainstTerrain = false;
    log('地球OK。PLATEAU新宿区の実建物を読み込み中...\n（初回は数十秒かかることがあります）');

    // PLATEAU 新宿区 建築物モデル（テクスチャ付き・低解像度）公開3D Tiles
    const url = 'https://plateau.geospatial.jp/main/data/3d-tiles/bldg/13100_tokyo/13104_shinjuku-ku/low_resolution/tileset.json';
    const tileset = await Cesium.Cesium3DTileset.fromUrl(url, { maximumScreenSpaceError: 16 });
    viewer.scene.primitives.add(tileset);

    // 読み込めたら件数を表示
    tileset.allTilesLoaded.addEventListener(() => {
      log('✅ PLATEAU新宿区の実建物を表示しました\n本物の建物形状です（OSMの箱ではありません）\n指でドラッグ＝回転 / ピンチ＝ズーム');
    });

    // 新宿駅上空へカメラを移動（実建物を斜め上から見る）
    await viewer.flyTo(tileset, {
      offset: new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(0),
        Cesium.Math.toRadians(-35),     // 斜め見下ろし
        2500),                           // 距離2.5km
      duration: 3,
    });

    setTimeout(() => {
      if (document.getElementById('status').textContent.indexOf('✅') === -1) {
        log('建物データ取得中... まだ出ない場合はPLATEAUサーバー側の遅延です\n少し待つか、ドラッグして視点を動かしてみてください');
      }
    }, 12000);

  } catch (e) {
    log('❌ エラー: ' + (e && e.message ? e.message : e) + '\nPLATEAU配信URLかネットワークの問題の可能性');
  }
})();
</script>
</body>
</html>
